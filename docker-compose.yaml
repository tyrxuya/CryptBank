version: '3.9'

services:
  cryptbank_db:
    container_name: cryptbank_db
    image: postgres
    restart: unless-stopped
    networks:
      - cryptbank
    ports:
      - "5432:5432"
    volumes:
      - cryptbank_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=1234
      - POSTGRES_USER=postgres
      - POSTGRES_DB=cryptbank
  pgadmin:
    container_name: cryptbank_pgadmin
    image: dpage/pgadmin4
    networks:
      - cryptbank
    environment:
      PGADMIN_DEFAULT_EMAIL: admin_not_used@user.com
      PGADMIN_DEFAULT_PASSWORD: admin_not_used
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    restart: always
    volumes:
      - pgadmin_data:/var/lib/pgadmin

networks:
  cryptbank:
    driver: bridge

volumes:
  cryptbank_db:
  pgadmin_data: